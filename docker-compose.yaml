services:
  sla_tracker:
    build:
      context: .
      dockerfile: src/services/SLA_tracker/Dockerfile
    container_name: sla_tracker_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./config:/app/config
    networks:
      - bot_network
      - monitoring

  ticket_tracker:
    build:
      context: .
      dockerfile: src/services/ticket_tracker/Dockerfile
    container_name: ticket_tracker_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    networks:
      - bot_network
      - monitoring

  commands_handler:
    build:
      context: .
      dockerfile: src/services/commands_handler/Dockerfile
    container_name: commands_handler_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./ansible/:/app/ansible/
      - ./config:/app/config
      - ./scripts:/app/scripts
    networks:
      - bot_network
      - monitoring

  redis:
    image: "redis:alpine"
    container_name: redis_db
    restart: on-failure
    volumes:
      - redis_data:/data
    networks:
      - bot_network
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: on-failure
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/etc/prometheus
    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - monitoring

volumes:
  redis_data:
  prometheus_data:
  
networks:
  bot_network:
    driver: bridge
  
  monitoring:
    driver: bridge