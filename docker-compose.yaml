version: '3.8'

services:
  sla_tracker:
    build:
      context: ./src/services/SLA_tracker/
      dockerfile: Dockerfile
      additional_contexts:
        common: ./src/common/
    container_name: sla_tracker_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./config:/app/config
    networks:
      - bot_network

  ticket_tracker:
    build:
      context: ./src/services/ticket_tracker/
      dockerfile: Dockerfile
      additional_contexts:
        common: ./src/common/
    container_name: ticket_tracker_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    networks:
      - bot_network

  commands_handler:
    build:
      context: ./src/services/commands_handler/
      dockerfile: Dockerfile
      additional_contexts:
        common: ./src/common/
    container_name: commands_handler_app
    restart: on-failure
    environment:
      - PYTHONPATH=/app   
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./ansible/:/app/ansible/
      - ./config:/app/config
    networks:
      - bot_network

  redis:
    image: "redis:alpine"
    container_name: redis_db
    restart: on-failure
    volumes:
      - redis_data:/data
    networks:
      - bot_network

volumes:
  redis_data:
  
networks:
  bot_network:
    driver: bridge